name: Lint AI Config Files

on:
  push:
    branches: [main]
    paths: ['agents/**', 'skills/**', 'commands/**', 'rules/**', 'bin/**', 'CLAUDE.md', '.agnix.toml']
  pull_request:
    branches: [main]
    paths: ['agents/**', 'skills/**', 'commands/**', 'rules/**', 'bin/**', 'CLAUDE.md', '.agnix.toml']

jobs:
  agnix:
    name: agnix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install agnix
        run: npm install -g agnix@0.16.5
      - name: Lint AI config files
        run: python3 bin/agnix-check .
