name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Run tests
        run: uv run --with pytest pytest tests/ -v

      - name: Lint
        run: uv run --with ruff ruff check bin/ tests/

      - name: Format check
        run: uv run --with ruff ruff format --check bin/ tests/

  shell-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure git auth for pre-commit hook cloning
        run: git config --global url."https://x-access-token:${{ github.token }}@github.com/".insteadOf "https://github.com/"
      - uses: pre-commit/action@v3.0.1
