name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Run tests
        run: uv run --with pytest --with python-frontmatter --find-links packages/spec-helper pytest tests/ -v
        env:
          PYTHONPATH: packages/spec-helper/src

      - name: Lint
        run: uv run --with ruff ruff check packages/ tests/

      - name: Format check
        run: uv run --with ruff ruff format --check packages/ tests/

  shell-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pre-commit/action@v3.0.1
        with:
          extra_args: shellcheck --all-files
      - uses: pre-commit/action@v3.0.1
        with:
          extra_args: shfmt --all-files
