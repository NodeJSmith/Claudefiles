# Compliance: user intents routed to the correct CLI tool
#
# Rule source: rules/common/capabilities.md (intent routing table + CLI Tools section)
#
# Tests that natural-language user prompts trigger the correct CLI helper
# via Bash tool invocation. These are purpose-built scripts in ~/.local/bin/
# that should be used instead of raw shell commands.
#
# Each tool has 3 prompt variations:
#   1. Direct match — uses exact trigger phrases from routing table
#   2. Natural language — how a real user would phrase it
#   3. Contextual/indirect — embedded in broader context
#
# Run: npx promptfoo eval -c evals/compliance/routing/intent-to-cli-tool.yaml

description: "Compliance: user intents routed to correct CLI tools"

providers:
  - id: anthropic:claude-agent-sdk
    config:
      model: claude-sonnet-4-6
      permission_mode: default
      setting_sources: ['user']
      working_dir: .

tests:
  # --- gh-pr-threads ---
  - description: "list PR threads → gh-pr-threads (direct)"
    vars:
      prompt: "Show me the unresolved PR review threads"
      expectedTool: "gh-pr-threads"
    assert:
      - type: javascript
        value: &cli_assertion |
          const toolCalls = context.providerResponse?.metadata?.toolCalls ?? [];
          const tool = context.vars.expectedTool;
          const escaped = tool.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
          const toolRegex = new RegExp(escaped);
          // Check 1: tool appears in actual Bash calls (executed or attempted)
          const bashCalls = toolCalls.filter(c => c.name === 'Bash');
          const calledViaBash = bashCalls.some(c => toolRegex.test(c.input?.command ?? ''));
          // Check 2: tool name appears in Claude's response text (routing was correct
          // even if execution was blocked by permissions)
          const responseText = output || '';
          const mentionedInResponse = toolRegex.test(responseText);
          if (!calledViaBash && !mentionedInResponse) {
            const cmds = bashCalls.map(c => (c.input?.command ?? '').slice(0, 80)).join('\n  ');
            return { pass: false, score: 0, reason: `Expected ${tool} not found in tool calls or response. Bash commands:\n  ${cmds || 'none'}` };
          }
          const how = calledViaBash ? 'tool call' : 'response mention';
          return { pass: true, score: 1, reason: `✓ ${tool} correctly routed (${how})` };

  - description: "unresolved comments → gh-pr-threads (natural)"
    vars:
      prompt: "what comments are still open on the current PR?"
      expectedTool: "gh-pr-threads"
    assert:
      - type: javascript
        value: *cli_assertion

  - description: "PR review status → gh-pr-threads (indirect)"
    vars:
      prompt: "before I push more changes, show me what the reviewers are still waiting on"
      expectedTool: "gh-pr-threads"
    assert:
      - type: javascript
        value: *cli_assertion

  # --- claude-tmux ---
  - description: "rename tmux session → claude-tmux (direct)"
    vars:
      prompt: "Rename the tmux session to myproject-feature"
      expectedTool: "claude-tmux"
    assert:
      - type: javascript
        value: *cli_assertion

  - description: "new tmux session → claude-tmux (natural)"
    vars:
      prompt: "set up a new tmux session for this feature work"
      expectedTool: "claude-tmux"
    assert:
      - type: javascript
        value: *cli_assertion

  - description: "tmux name → claude-tmux (indirect)"
    vars:
      prompt: "what's the current tmux session called?"
      expectedTool: "claude-tmux"
    assert:
      - type: javascript
        value: *cli_assertion

  # --- claude-log ---
  - description: "search session logs → claude-log (direct)"
    vars:
      prompt: "What did I work on yesterday? Search the session logs"
      expectedTool: "claude-log"
    assert:
      - type: javascript
        value: *cli_assertion

  - description: "find session → claude-log (natural)"
    vars:
      prompt: "find the session where I was working on the auth refactor last week"
      expectedTool: "claude-log"
    assert:
      - type: javascript
        value: *cli_assertion

  - description: "session history → claude-log (indirect)"
    vars:
      prompt: "I need to remember what approach we took for the caching fix — can you check the logs?"
      expectedTool: "claude-log"
    assert:
      - type: javascript
        value: *cli_assertion

  # --- claude-merge-settings ---
  - description: "merge settings → claude-merge-settings (direct)"
    vars:
      prompt: "Merge my claude settings from all layers"
      expectedTool: "claude-merge-settings"
    assert:
      - type: javascript
        value: *cli_assertion

  - description: "apply settings → claude-merge-settings (natural)"
    vars:
      prompt: "apply the updated settings configuration"
      expectedTool: "claude-merge-settings"
    assert:
      - type: javascript
        value: *cli_assertion

  - description: "settings sync → claude-merge-settings (indirect)"
    vars:
      prompt: "I just edited settings.json in the repo — make sure the merged output is up to date"
      expectedTool: "claude-merge-settings"
    assert:
      - type: javascript
        value: *cli_assertion

  # --- ado-builds ---
  - description: "cancel ADO builds → ado-builds (direct)"
    vars:
      prompt: "Cancel all in-progress ADO builds for tag abc123"
      expectedTool: "ado-builds"
    assert:
      - type: javascript
        value: *cli_assertion

  - description: "list pipeline runs → ado-builds (natural)"
    vars:
      prompt: "list the recent Azure DevOps build runs for this repo"
      expectedTool: "ado-builds"
    assert:
      - type: javascript
        value: *cli_assertion

  - description: "stop builds → ado-builds (indirect)"
    vars:
      prompt: "there are stale pipeline runs clogging the queue — cancel them"
      expectedTool: "ado-builds"
    assert:
      - type: javascript
        value: *cli_assertion

prompts:
  - "{{prompt}}"
