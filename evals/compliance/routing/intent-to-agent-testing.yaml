# Compliance: testing agent routing
#
# Rule source: rules/common/agents.md (agent routing table)
#
# Tests testing-focused agents: reality-checker, api-tester,
# performance-benchmarker, tool-evaluator, workflow-optimizer.
#
# Run: npx promptfoo eval -c evals/compliance/routing/intent-to-agent-testing.yaml

description: "Compliance: testing agents routing"

providers:
  - id: anthropic:claude-agent-sdk
    config:
      model: claude-sonnet-4-6
      permission_mode: default
      setting_sources: ['user']
      working_dir: .

tests:
  # --- testing-reality-checker ---
  - description: "pre-ship gate → reality-checker agent (direct)"
    vars:
      prompt: "run the adversarial pre-ship visual gate before we deploy"
      expectedAgent: "reality-checker|Reality Checker"
    assert:
      - type: javascript
        value: &agent_assertion |
          const toolCalls = context.providerResponse?.metadata?.toolCalls ?? [];
          const agentPattern = new RegExp(context.vars.expectedAgent, 'i');
          const calledViaAgent = toolCalls.some(c => {
            if (c.name !== 'Agent') return false;
            const input = JSON.stringify(c.input ?? {});
            return agentPattern.test(input);
          });
          const responseText = output || '';
          const mentionedInResponse = agentPattern.test(responseText);
          if (!calledViaAgent && !mentionedInResponse) {
            const agentCalls = toolCalls.filter(c => c.name === 'Agent').map(c => JSON.stringify(c.input?.subagent_type || c.input?.description || '').slice(0,80));
            const otherCalls = toolCalls.filter(c => c.name !== 'Agent').map(c => c.name).slice(0, 5);
            return { pass: false, score: 0, reason: `Expected agent matching /${context.vars.expectedAgent}/ not found in tool calls or response. Agent calls: [${agentCalls.join(', ') || 'none'}]. Other tools: [${otherCalls.join(', ')}]` };
          }
          const how = calledViaAgent ? 'tool call' : 'response mention';
          return { pass: true, score: 1, reason: `✓ Agent matching /${context.vars.expectedAgent}/ correctly routed (${how})` };

  - description: "visual verification → reality-checker agent (natural)"
    vars:
      prompt: "take screenshots across devices and verify the UI looks right before shipping"
      expectedAgent: "reality-checker|Reality Checker"
    assert:
      - type: javascript
        value: *agent_assertion

  - description: "production readiness → reality-checker agent (indirect)"
    vars:
      prompt: "I think we're ready to deploy but I want a hard second opinion — check everything visually"
      expectedAgent: "reality-checker|Reality Checker"
    assert:
      - type: javascript
        value: *agent_assertion

  # --- testing-api-tester ---
  - description: "API validation → api-tester agent (direct)"
    vars:
      prompt: "run API validation and contract testing on the user endpoints"
      expectedAgent: "api-tester|API Tester"
    assert:
      - type: javascript
        value: *agent_assertion

  - description: "test API endpoints → api-tester agent (natural)"
    vars:
      prompt: "test all the REST API endpoints — check responses, status codes, and edge cases"
      expectedAgent: "api-tester|API Tester"
    assert:
      - type: javascript
        value: *agent_assertion

  - description: "contract testing → api-tester agent (indirect)"
    vars:
      prompt: "the frontend team says our API responses changed — run contract tests to verify"
      expectedAgent: "api-tester|API Tester"
    assert:
      - type: javascript
        value: *agent_assertion

  # --- testing-performance-benchmarker ---
  - description: "load testing → performance-benchmarker agent (direct)"
    vars:
      prompt: "run load testing on the API to find our throughput limits"
      expectedAgent: "performance|Performance"
    assert:
      - type: javascript
        value: *agent_assertion

  - description: "Core Web Vitals → performance-benchmarker agent (natural)"
    vars:
      prompt: "measure the Core Web Vitals for our main pages and identify what's slow"
      expectedAgent: "performance|Performance"
    assert:
      - type: javascript
        value: *agent_assertion

  - description: "capacity planning → performance-benchmarker agent (indirect)"
    vars:
      prompt: "we're expecting 10x traffic next month — benchmark our current capacity and tell me where we'll hit limits"
      expectedAgent: "performance|Performance"
    assert:
      - type: javascript
        value: *agent_assertion

  # --- testing-tool-evaluator ---
  - description: "technology assessment → tool-evaluator agent (direct)"
    vars:
      prompt: "evaluate Redis vs Memcached for our caching needs"
      expectedAgent: "tool-evaluator|Tool Evaluator"
    assert:
      - type: javascript
        value: *agent_assertion

  - description: "tool comparison → tool-evaluator agent (natural)"
    vars:
      prompt: "compare Celery, Dramatiq, and Huey for background task processing"
      expectedAgent: "tool-evaluator|Tool Evaluator"
    assert:
      - type: javascript
        value: *agent_assertion

  - description: "platform recommendation → tool-evaluator agent (indirect)"
    vars:
      prompt: "we need a message queue — assess RabbitMQ, Kafka, and SQS for our use case and recommend one"
      expectedAgent: "tool-evaluator|Tool Evaluator"
    assert:
      - type: javascript
        value: *agent_assertion

  # --- testing-workflow-optimizer ---
  - description: "process improvement → workflow-optimizer agent (direct)"
    vars:
      prompt: "find bottlenecks in our development workflow and suggest improvements"
      expectedAgent: "workflow-optimizer|Workflow Optimizer"
    assert:
      - type: javascript
        value: *agent_assertion

  - description: "automation opportunities → workflow-optimizer agent (natural)"
    vars:
      prompt: "analyze our release process and identify what can be automated"
      expectedAgent: "workflow-optimizer|Workflow Optimizer"
    assert:
      - type: javascript
        value: *agent_assertion

  - description: "bottleneck removal → workflow-optimizer agent (indirect)"
    vars:
      prompt: "our deploys take 45 minutes and require 3 manual steps — optimize this process"
      expectedAgent: "workflow-optimizer|Workflow Optimizer"
    assert:
      - type: javascript
        value: *agent_assertion

prompts:
  - "{{prompt}}"
