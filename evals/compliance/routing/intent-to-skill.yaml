# Compliance: user intents routed to the correct skill
#
# Rule source: rules/common/capabilities.md (intent routing table)
#
# Tests that natural-language user prompts trigger the correct skill
# via the Skill tool. Each test case represents a common way users
# phrase the intent.
#
# Each skill has 3 prompt variations:
#   1. Direct match — uses exact trigger phrases from routing table
#   2. Natural language — how a real user would phrase it
#   3. Contextual/indirect — embedded in broader context
#
# Run: npx promptfoo eval -c evals/compliance/routing/intent-to-skill.yaml

description: "Compliance: user intents routed to correct skills"

providers:
  - id: anthropic:claude-agent-sdk
    config:
      model: claude-sonnet-4-6
      permission_mode: default
      working_dir: ../../../evals/fixtures/python-api
      setting_sources: ['user']
      append_allowed_tools: ['Skill']
      skip_git_repo_check: true

tests:
  # --- mine.ship ---
  - description: "ship it → /mine.ship (direct)"
    vars:
      prompt: "ship it"
      expectedSkill: "mine.ship"
    assert:
      - type: javascript
        value: &skill_assertion |
          const toolCalls = context.providerResponse?.metadata?.toolCalls ?? [];
          const skillName = context.vars.expectedSkill;
          const escaped = skillName.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
          const skillRegex = new RegExp(escaped);
          // Check 1: Skill tool called with matching name
          const calledViaSkill = toolCalls.some(c =>
            c.name === 'Skill' && skillRegex.test(JSON.stringify(c.input ?? {}))
          );
          // Check 2: skill name appears in response (routing correct even if blocked)
          const responseText = output || '';
          const mentionedInResponse = skillRegex.test(responseText);
          if (!calledViaSkill && !mentionedInResponse) {
            const names = toolCalls.map(c => `${c.name}(${JSON.stringify(c.input?.skill || c.input?.command || '').slice(0,60)})`).join(', ');
            return { pass: false, score: 0, reason: `Expected skill ${skillName} not found in tool calls or response. Tool calls: [${names || 'none'}]` };
          }
          const how = calledViaSkill ? 'tool call' : 'response mention';
          return { pass: true, score: 1, reason: `✓ ${skillName} correctly routed (${how})` };

  - description: "commit push and PR → /mine.ship (natural)"
    vars:
      prompt: "commit everything, push it up, and open a PR"
      expectedSkill: "mine.ship"
    assert:
      - type: javascript
        value: *skill_assertion

  - description: "ready to merge → /mine.ship (indirect)"
    vars:
      prompt: "I'm done with this feature, let's get it shipped to the repo"
      expectedSkill: "mine.ship"
    assert:
      - type: javascript
        value: *skill_assertion

  # --- mine.commit-push ---
  - description: "commit and push → /mine.commit-push (direct)"
    vars:
      prompt: "commit and push"
      expectedSkill: "mine.commit-push"
    assert:
      - type: javascript
        value: *skill_assertion

  - description: "save and push changes → /mine.commit-push (natural)"
    vars:
      prompt: "save my changes and push them to the remote"
      expectedSkill: "mine.commit-push"
    assert:
      - type: javascript
        value: *skill_assertion

  - description: "push what I have → /mine.commit-push (indirect)"
    vars:
      prompt: "I've finished the fix, go ahead and commit and push it up"
      expectedSkill: "mine.commit-push"
    assert:
