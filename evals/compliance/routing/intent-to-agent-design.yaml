# Compliance: design agent routing
#
# Rule source: rules/common/agents.md (agent routing table)
#
# Tests design-focused agents: ux-researcher, ux-architect,
# ui-designer, visual-storyteller.
#
# Run: npx promptfoo eval -c evals/compliance/routing/intent-to-agent-design.yaml

description: "Compliance: design agents routing"

providers:
  - id: anthropic:claude-agent-sdk
    config:
      model: claude-sonnet-4-6
      permission_mode: default
      setting_sources: ['user']
      working_dir: .

tests:
  # --- design-ux-researcher ---
  - description: "user behavior research → ux-researcher agent (direct)"
    vars:
      prompt: "conduct user behavior research on how people use the settings page"
      expectedAgent: "ux-researcher|UX Researcher"
    assert:
      - type: javascript
        value: &agent_assertion |
          const toolCalls = context.providerResponse?.metadata?.toolCalls ?? [];
          const agentPattern = new RegExp(context.vars.expectedAgent, 'i');
          const calledViaAgent = toolCalls.some(c => {
            if (c.name !== 'Agent') return false;
            const input = JSON.stringify(c.input ?? {});
            return agentPattern.test(input);
          });
          const responseText = output || '';
          const mentionedInResponse = agentPattern.test(responseText);
          if (!calledViaAgent && !mentionedInResponse) {
            const agentCalls = toolCalls.filter(c => c.name === 'Agent').map(c => JSON.stringify(c.input?.subagent_type || c.input?.description || '').slice(0,80));
            const otherCalls = toolCalls.filter(c => c.name !== 'Agent').map(c => c.name).slice(0, 5);
            return { pass: false, score: 0, reason: `Expected agent matching /${context.vars.expectedAgent}/ not found in tool calls or response. Agent calls: [${agentCalls.join(', ') || 'none'}]. Other tools: [${otherCalls.join(', ')}]` };
          }
          const how = calledViaAgent ? 'tool call' : 'response mention';
          return { pass: true, score: 1, reason: `✓ Agent matching /${context.vars.expectedAgent}/ correctly routed (${how})` };

  - description: "usability testing → ux-researcher agent (natural)"
    vars:
      prompt: "plan and execute usability testing for the new checkout flow"
      expectedAgent: "ux-researcher|UX Researcher"
    assert:
      - type: javascript
        value: *agent_assertion

  - description: "user research → ux-researcher agent (indirect)"
    vars:
      prompt: "users are dropping off at step 3 of onboarding — research why and give me actionable insights"
      expectedAgent: "ux-researcher|UX Researcher"
    assert:
      - type: javascript
        value: *agent_assertion

  # --- design-ux-architect ---
  - description: "CSS systems → ux-architect agent (direct)"
    vars:
      prompt: "set up a CSS design system with tokens and utility classes"
      expectedAgent: "ux-architect|UX Architect"
    assert:
      - type: javascript
        value: *agent_assertion

  - description: "layout foundations → ux-architect agent (natural)"
    vars:
      prompt: "create the layout foundation — grid system, spacing scale, and responsive breakpoints"
      expectedAgent: "ux-architect|UX Architect"
    assert:
      - type: javascript
        value: *agent_assertion

  - description: "design system architecture → ux-architect agent (indirect)"
    vars:
      prompt: "we need a solid CSS architecture before the team starts building components — set up the foundation"
      expectedAgent: "ux-architect|UX Architect"
    assert:
      - type: javascript
        value: *agent_assertion

  # --- design-ui-designer ---
  - description: "visual design system → ui-designer agent (direct)"
    vars:
      prompt: "create a visual design system with a component library"
      expectedAgent: "ui-designer|UI Designer"
    assert:
      - type: javascript
        value: *agent_assertion

  - description: "component library → ui-designer agent (natural)"
    vars:
      prompt: "design a consistent component library — buttons, forms, cards, modals, and typography"
      expectedAgent: "ui-designer|UI Designer"
    assert:
      - type: javascript
        value: *agent_assertion

  - description: "pixel-perfect UI → ui-designer agent (indirect)"
    vars:
      prompt: "the dashboard looks inconsistent — redesign the visual language so all components feel cohesive"
      expectedAgent: "ui-designer|UI Designer"
    assert:
      - type: javascript
        value: *agent_assertion

  # --- design-visual-storyteller ---
  - description: "visual narratives → visual-storyteller agent (direct)"
    vars:
      prompt: "create a visual narrative explaining our quarterly metrics"
      expectedAgent: "visual-storyteller|Visual Storyteller"
    assert:
      - type: javascript
        value: *agent_assertion

  - description: "data visualization → visual-storyteller agent (natural)"
    vars:
      prompt: "turn this performance data into a compelling visual story for the executive presentation"
      expectedAgent: "visual-storyteller|Visual Storyteller"
    assert:
      - type: javascript
        value: *agent_assertion

  - description: "infographic → visual-storyteller agent (indirect)"
    vars:
      prompt: "we need to explain our infrastructure migration to non-technical stakeholders — create a visual story"
      expectedAgent: "visual-storyteller|Visual Storyteller"
    assert:
      - type: javascript
        value: *agent_assertion

prompts:
  - "{{prompt}}"
