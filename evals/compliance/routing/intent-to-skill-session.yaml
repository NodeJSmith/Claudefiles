# Compliance: session and workflow skill routing
#
# Rule source: rules/common/capabilities.md (intent routing table)
#
# Tests session management and workflow skills: status, pre-compact,
# session_reflect, capture_lesson, worktree-rebase, adrs, issues, issues-scan.
#
# Run: npx promptfoo eval -c evals/compliance/routing/intent-to-skill-session.yaml

description: "Compliance: session and workflow skills routing"

providers:
  - id: anthropic:claude-agent-sdk
    config:
      model: claude-sonnet-4-6
      permission_mode: default
      working_dir: ../../../evals/fixtures/python-api
      setting_sources: ['user']
      append_allowed_tools: ['Skill']
      skip_git_repo_check: true

tests:
  # --- mine.status ---
  - description: "status → /mine.status (direct)"
    vars:
      prompt: "status"
      expectedSkill: "mine.status"
    assert:
      - type: javascript
        value: &skill_assertion |
          const toolCalls = context.providerResponse?.metadata?.toolCalls ?? [];
          const skillName = context.vars.expectedSkill;
          const escaped = skillName.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
          const skillRegex = new RegExp(escaped);
          const calledViaSkill = toolCalls.some(c =>
            c.name === 'Skill' && skillRegex.test(JSON.stringify(c.input ?? {}))
          );
          const responseText = output || '';
          const mentionedInResponse = skillRegex.test(responseText);
          if (!calledViaSkill && !mentionedInResponse) {
            const names = toolCalls.map(c => `${c.name}(${JSON.stringify(c.input?.skill || c.input?.command || '').slice(0,60)})`).join(', ');
            return { pass: false, score: 0, reason: `Expected skill ${skillName} not found in tool calls or response. Tool calls: [${names || 'none'}]` };
          }
          const how = calledViaSkill ? 'tool call' : 'response mention';
          return { pass: true, score: 1, reason: `✓ ${skillName} correctly routed (${how})` };

  - description: "where am I → /mine.status (natural)"
    vars:
      prompt: "where am I? give me a quick summary of what's going on"
      expectedSkill: "mine.status"
    assert:
      - type: javascript
        value: *skill_assertion

  - description: "quick orientation → /mine.status (indirect)"
    vars:
      prompt: "I just resumed this session — what branch am I on and what was I working on?"
      expectedSkill: "mine.status"
    assert:
      - type: javascript
        value: *skill_assertion

  # --- mine.pre-compact ---
  - description: "prepare to compact → /mine.pre-compact (direct)"
    vars:
      prompt: "prepare to compact"
      expectedSkill: "mine.pre-compact"
    assert:
      - type: javascript
        value: *skill_assertion

  - description: "running low on context → /mine.pre-compact (natural)"
    vars:
      prompt: "I'm running low on context — prepare a compact prompt"
      expectedSkill: "mine.pre-compact"
    assert:
      - type: javascript
        value: *skill_assertion

  - description: "context window management → /mine.pre-compact (indirect)"
    vars:
      prompt: "this conversation is getting long — generate a summary I can use for /compact"
      expectedSkill: "mine.pre-compact"
    assert:
      - type: javascript
        value: *skill_assertion

  # --- mine.session_reflect ---
  - description: "session retrospective → /mine.session_reflect (direct)"
    vars:
      prompt: "do a session retrospective"
      expectedSkill: "mine.session_reflect"
    assert:
      - type: javascript
        value: *skill_assertion

  - description: "what did we learn → /mine.session_reflect (natural)"
    vars:
      prompt: "what did we learn in this session? capture the decisions and patterns"
      expectedSkill: "mine.session_reflect"
    assert:
      - type: javascript
        value: *skill_assertion

  - description: "end of session → /mine.session_reflect (indirect)"
    vars:
      prompt: "I'm about to wrap up — let's reflect on what we accomplished and any lessons learned"
      expectedSkill: "mine.session_reflect"
    assert:
      - type: javascript
        value: *skill_assertion

  # --- mine.capture_lesson ---
  - description: "capture this pattern → /mine.capture_lesson (direct)"
    vars:
      prompt: "capture this pattern as a lesson"
      expectedSkill: "mine.capture_lesson"
    assert:
      - type: javascript
        value: *skill_assertion

  - description: "save this lesson → /mine.capture_lesson (natural)"
    vars:
      prompt: "that workaround was non-trivial — save it as a reusable lesson before we move on"
      expectedSkill: "mine.capture_lesson"
    assert:
      - type: javascript
        value: *skill_assertion

  - description: "reusable insight → /mine.capture_lesson (indirect)"
    vars:
      prompt: "we just figured out a tricky pattern for handling concurrent writes — grab that as a skill file"
      expectedSkill: "mine.capture_lesson"
    assert:
      - type: javascript
        value: *skill_assertion

  # --- mine.worktree-rebase ---
  - description: "rebase this worktree → /mine.worktree-rebase (direct)"
    vars:
      prompt: "rebase this worktree onto the parent branch"
      expectedSkill: "mine.worktree-rebase"
    assert:
      - type: javascript
        value: *skill_assertion

  - description: "sync worktree → /mine.worktree-rebase (natural)"
    vars:
      prompt: "sync this worktree to the feature branch the parent repo is on"
      expectedSkill: "mine.worktree-rebase"
    assert:
      - type: javascript
        value: *skill_assertion

  - description: "worktree base mismatch → /mine.worktree-rebase (indirect)"
    vars:
      prompt: "this worktree is based on main but I started from a feature branch — fix the base"
      expectedSkill: "mine.worktree-rebase"
    assert:
      - type: javascript
        value: *skill_assertion

  # --- mine.adrs ---
  - description: "create an ADR → /mine.adrs (direct)"
    vars:
      prompt: "record this decision as an ADR"
      expectedSkill: "mine.adrs"
    assert:
      - type: javascript
        value: *skill_assertion

  - description: "architecture decision → /mine.adrs (natural)"
    vars:
      prompt: "we just decided to use PostgreSQL over MongoDB — let's document that decision"
      expectedSkill: "mine.adrs"
    assert:
      - type: javascript
        value: *skill_assertion

  - description: "record decision → /mine.adrs (indirect)"
    vars:
      prompt: "create an architecture decision record for why we chose event sourcing over CRUD"
      expectedSkill: "mine.adrs"
    assert:
      - type: javascript
        value: *skill_assertion

  # --- mine.issues ---
  - description: "show issue → /mine.issues (direct)"
    vars:
      prompt: "show me issue #42"
      expectedSkill: "mine.issues"
    assert:
      - type: javascript
        value: *skill_assertion

  - description: "investigate issue → /mine.issues (natural)"
    vars:
      prompt: "investigate issue #15 and tell me what's going on"
      expectedSkill: "mine.issues"
    assert:
      - type: javascript
        value: *skill_assertion

  - description: "deep dive issue → /mine.issues (indirect)"
    vars:
      prompt: "I was assigned issue #23 — deep dive it and help me understand the scope"
      expectedSkill: "mine.issues"
    assert:
      - type: javascript
        value: *skill_assertion

  # --- mine.issues-scan ---
  - description: "scan issues → /mine.issues-scan (direct)"
    vars:
      prompt: "scan the open issues"
      expectedSkill: "mine.issues-scan"
    assert:
      - type: javascript
        value: *skill_assertion

  - description: "what issues are open → /mine.issues-scan (natural)"
    vars:
      prompt: "what issues are currently open? classify them by effort"
      expectedSkill: "mine.issues-scan"
    assert:
      - type: javascript
        value: *skill_assertion

  - description: "pick an issue → /mine.issues-scan (indirect)"
    vars:
      prompt: "I have some free time — scan the open issues and help me pick one to work on"
      expectedSkill: "mine.issues-scan"
    assert:
      - type: javascript
        value: *skill_assertion

prompts:
  - "{{prompt}}"
