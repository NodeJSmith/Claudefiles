# Compliance: design and UX skill routing
#
# Rule source: rules/common/capabilities.md (intent routing table)
#
# Tests design and UX skills: look-and-feel, visual-qa, mockup.
#
# Run: npx promptfoo eval -c evals/compliance/routing/intent-to-skill-design-ux.yaml

description: "Compliance: design and UX skills routing"

providers:
  - id: anthropic:claude-agent-sdk
    config:
      model: claude-sonnet-4-6
      permission_mode: default
      working_dir: ../../../evals/fixtures/python-api
      setting_sources: ['user']
      append_allowed_tools: ['Skill']
      skip_git_repo_check: true

tests:
  # --- mine.look-and-feel ---
  - description: "design this UI → /mine.look-and-feel (direct)"
    vars:
      prompt: "design this UI for the settings page"
      expectedSkill: "mine.look-and-feel"
    assert:
      - type: javascript
        value: &skill_assertion |
          const toolCalls = context.providerResponse?.metadata?.toolCalls ?? [];
          const skillName = context.vars.expectedSkill;
          const escaped = skillName.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
          const skillRegex = new RegExp(escaped);
          const calledViaSkill = toolCalls.some(c =>
            c.name === 'Skill' && skillRegex.test(JSON.stringify(c.input ?? {}))
          );
          const responseText = output || '';
          const mentionedInResponse = skillRegex.test(responseText);
          if (!calledViaSkill && !mentionedInResponse) {
            const names = toolCalls.map(c => `${c.name}(${JSON.stringify(c.input?.skill || c.input?.command || '').slice(0,60)})`).join(', ');
            return { pass: false, score: 0, reason: `Expected skill ${skillName} not found in tool calls or response. Tool calls: [${names || 'none'}]` };
          }
          const how = calledViaSkill ? 'tool call' : 'response mention';
          return { pass: true, score: 1, reason: `✓ ${skillName} correctly routed (${how})` };

  - description: "dashboard look and feel → /mine.look-and-feel (natural)"
    vars:
      prompt: "plan the look and feel for the monitoring dashboard — what colors, fonts, and spacing should we use?"
      expectedSkill: "mine.look-and-feel"
    assert:
      - type: javascript
        value: *skill_assertion

  - description: "design tokens for admin panel → /mine.look-and-feel (indirect)"
    vars:
      prompt: "I need a clean admin panel for managing user accounts — establish design tokens and a visual direction"
      expectedSkill: "mine.look-and-feel"
    assert:
      - type: javascript
        value: *skill_assertion

  # --- mine.visual-qa ---
  - description: "UX review → /mine.visual-qa (direct)"
    vars:
      prompt: "do a UX review on the profile page"
      expectedSkill: "mine.visual-qa"
    assert:
      - type: javascript
        value: *skill_assertion

  - description: "screenshot review → /mine.visual-qa (natural)"
    vars:
      prompt: "take screenshots of the app and tell me what's wrong"
      expectedSkill: "mine.visual-qa"
    assert:
      - type: javascript
        value: *skill_assertion

  - description: "visual QA → /mine.visual-qa (indirect)"
    vars:
      prompt: "users are complaining the onboarding flow is confusing — do a visual QA on it"
      expectedSkill: "mine.visual-qa"
    assert:
      - type: javascript
        value: *skill_assertion

  # --- mine.mockup ---
  - description: "generate a mockup → /mine.mockup (direct)"
    vars:
      prompt: "generate an HTML mockup of the new onboarding flow"
      expectedSkill: "mine.mockup"
    assert:
      - type: javascript
        value: *skill_assertion

  - description: "show me what it looks like → /mine.mockup (natural)"
    vars:
      prompt: "show me what the settings page would look like as a self-contained HTML preview"
      expectedSkill: "mine.mockup"
    assert:
      - type: javascript
        value: *skill_assertion

  - description: "UI preview → /mine.mockup (indirect)"
    vars:
      prompt: "I want to see a visual preview of the admin dashboard before we start coding — mockup this UI"
      expectedSkill: "mine.mockup"
    assert:
      - type: javascript
        value: *skill_assertion

  # --- Boundary tests: mine.design vs mine.look-and-feel ---
  - description: "design this change → /mine.design (NOT mine.look-and-feel)"
    vars:
      prompt: "design this change to the authentication system"
      expectedSkill: "mine.design"
    assert:
      - type: javascript
        value: *skill_assertion

  - description: "plan the look and feel → /mine.look-and-feel (NOT mine.design)"
    vars:
      prompt: "plan the look and feel for this dashboard"
      expectedSkill: "mine.look-and-feel"
    assert:
      - type: javascript
        value: *skill_assertion

  - description: "design this UI → /mine.look-and-feel (visual, NOT architecture)"
    vars:
      prompt: "design this UI"
      expectedSkill: "mine.look-and-feel"
    assert:
      - type: javascript
        value: *skill_assertion

  - description: "write a design doc → /mine.design (architecture)"
    vars:
      prompt: "write a design doc for the auth feature"
      expectedSkill: "mine.design"
    assert:
      - type: javascript
        value: *skill_assertion

  - description: "design the dashboard → /mine.look-and-feel (visual direction)"
    vars:
      prompt: "design the dashboard"
      expectedSkill: "mine.look-and-feel"
    assert:
      - type: javascript
        value: *skill_assertion

  - description: "what should this app look like → /mine.look-and-feel"
    vars:
      prompt: "what should this app look like"
      expectedSkill: "mine.look-and-feel"
    assert:
      - type: javascript
        value: *skill_assertion

  # --- Negative tests: dropped diagram routing ---
  - description: "architecture diagram must NOT route to /mine.mockup"
    vars:
      prompt: "generate an architecture diagram of this service"
      forbiddenSkill: "mine.mockup"
    assert:
      - type: javascript
        value: &negative_skill_assertion |
          const toolCalls = context.providerResponse?.metadata?.toolCalls ?? [];
          const skillName = context.vars.forbiddenSkill;
          const escaped = skillName.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
          const skillRegex = new RegExp(escaped);
          const calledViaSkill = toolCalls.some(c =>
            c.name === 'Skill' && skillRegex.test(JSON.stringify(c.input ?? {}))
          );
          const responseText = output || '';
          const mentionedInResponse = skillRegex.test(responseText);
          if (calledViaSkill || mentionedInResponse) {
            return { pass: false, score: 0, reason: `${skillName} should NOT be routed — diagram routing was intentionally dropped` };
          }
          return { pass: true, score: 1, reason: `✓ ${skillName} correctly NOT routed` };

  - description: "visualize data flow must NOT route to /mine.mockup"
    vars:
      prompt: "visualize how the data flows through this pipeline"
      forbiddenSkill: "mine.mockup"
    assert:
      - type: javascript
        value: *negative_skill_assertion

prompts:
  - "{{prompt}}"
