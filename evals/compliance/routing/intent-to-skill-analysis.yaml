# Compliance: analysis skill routing
#
# Rule source: rules/common/capabilities.md (intent routing table)
#
# Tests analysis and investigation skills: 5whys, eval-repo, mutation-test,
# tool-gaps, challenge, skill-eval, permissions-audit, agnix.
#
# Run: npx promptfoo eval -c evals/compliance/routing/intent-to-skill-analysis.yaml

description: "Compliance: analysis skills routing"

providers:
  - id: anthropic:claude-agent-sdk
    config:
      model: claude-sonnet-4-6
      permission_mode: default
      working_dir: ../../../evals/fixtures/python-api
      setting_sources: ['user']
      append_allowed_tools: ['Skill']
      skip_git_repo_check: true

tests:
  # --- mine.5whys ---
  - description: "five whys → /mine.5whys (direct)"
    vars:
      prompt: "run a five whys analysis on the recurring auth failures"
      expectedSkill: "mine.5whys"
    assert:
      - type: javascript
        value: &skill_assertion |
          const toolCalls = context.providerResponse?.metadata?.toolCalls ?? [];
          const skillName = context.vars.expectedSkill;
          const escaped = skillName.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
          const skillRegex = new RegExp(escaped);
          const calledViaSkill = toolCalls.some(c =>
            c.name === 'Skill' && skillRegex.test(JSON.stringify(c.input ?? {}))
          );
          const responseText = output || '';
          const mentionedInResponse = skillRegex.test(responseText);
          if (!calledViaSkill && !mentionedInResponse) {
            const names = toolCalls.map(c => `${c.name}(${JSON.stringify(c.input?.skill || c.input?.command || '').slice(0,60)})`).join(', ');
            return { pass: false, score: 0, reason: `Expected skill ${skillName} not found in tool calls or response. Tool calls: [${names || 'none'}]` };
          }
          const how = calledViaSkill ? 'tool call' : 'response mention';
          return { pass: true, score: 1, reason: `✓ ${skillName} correctly routed (${how})` };

  - description: "root cause analysis → /mine.5whys (natural)"
    vars:
      prompt: "this bug keeps coming back — help me do a root cause analysis"
      expectedSkill: "mine.5whys"
    assert:
      - type: javascript
        value: *skill_assertion

  - description: "why does this keep failing → /mine.5whys (indirect)"
    vars:
      prompt: "the deploy has failed 3 times this week for different reasons — why does this keep happening?"
      expectedSkill: "mine.5whys"
    assert:
      - type: javascript
        value: *skill_assertion

  # --- mine.eval-repo ---
  - description: "evaluate this repo → /mine.eval-repo (direct)"
    vars:
      prompt: "evaluate this repo before we adopt it"
      expectedSkill: "mine.eval-repo"
    assert:
      - type: javascript
        value: *skill_assertion

  - description: "should I use this library → /mine.eval-repo (natural)"
    vars:
      prompt: "should we use this library? assess its test coverage and maintenance health"
      expectedSkill: "mine.eval-repo"
    assert:
      - type: javascript
        value: *skill_assertion

  - description: "library assessment → /mine.eval-repo (indirect)"
    vars:
      prompt: "we're considering adopting fastapi-users — can you check if it's well-maintained and production-ready?"
      expectedSkill: "mine.eval-repo"
    assert:
      - type: javascript
        value: *skill_assertion

  # --- mine.mutation-test ---
  - description: "mutation test → /mine.mutation-test (direct)"
    vars:
      prompt: "run a mutation test on the validation module"
      expectedSkill: "mine.mutation-test"
    assert:
      - type: javascript
        value: *skill_assertion

  - description: "do tests catch bugs → /mine.mutation-test (natural)"
    vars:
      prompt: "do my tests actually catch real bugs? intentionally break some code and check"
      expectedSkill: "mine.mutation-test"
    assert:
      - type: javascript
        value: *skill_assertion

  - description: "test quality check → /mine.mutation-test (indirect)"
    vars:
      prompt: "we have 90% coverage but I'm not confident the tests are meaningful — can you verify by mutating the code?"
      expectedSkill: "mine.mutation-test"
    assert:
      - type: javascript
        value: *skill_assertion

  # --- mine.tool-gaps ---
  - description: "find tool gaps → /mine.tool-gaps (direct)"
    vars:
      prompt: "find tool gaps in my recent sessions"
      expectedSkill: "mine.tool-gaps"
    assert:
      - type: javascript
        value: *skill_assertion

  - description: "session archaeology → /mine.tool-gaps (natural)"
    vars:
      prompt: "look through my session history for recurring patterns that should be scripts"
      expectedSkill: "mine.tool-gaps"
    assert:
      - type: javascript
        value: *skill_assertion

  - description: "missing cli features → /mine.tool-gaps (indirect)"
    vars:
      prompt: "I feel like I keep writing the same bash one-liners — can you find what CLI tools I'm missing?"
      expectedSkill: "mine.tool-gaps"
    assert:
      - type: javascript
        value: *skill_assertion

  # --- mine.skill-eval ---
  - description: "evaluate skill → /mine.skill-eval (direct)"
    vars:
      prompt: "evaluate the skill variants for the commit workflow"
      expectedSkill: "mine.skill-eval"
    assert:
      - type: javascript
        value: *skill_assertion

  - description: "compare skill variants → /mine.skill-eval (natural)"
    vars:
      prompt: "compare the two versions of the brainstorm skill and tell me which performs better"
      expectedSkill: "mine.skill-eval"
    assert:
      - type: javascript
        value: *skill_assertion

  - description: "skill A/B test → /mine.skill-eval (indirect)"
    vars:
      prompt: "I rewrote the audit skill — can you A/B test the old vs new version?"
      expectedSkill: "mine.skill-eval"
    assert:
      - type: javascript
        value: *skill_assertion

  # --- mine.permissions-audit ---
  - description: "audit permissions → /mine.permissions-audit (direct)"
    vars:
      prompt: "audit my permission prompts"
      expectedSkill: "mine.permissions-audit"
    assert:
      - type: javascript
        value: *skill_assertion

  - description: "reduce prompts → /mine.permissions-audit (natural)"
    vars:
      prompt: "I'm getting too many permission prompts — figure out what to allow-list"
      expectedSkill: "mine.permissions-audit"
    assert:
      - type: javascript
        value: *skill_assertion

  - description: "permission friction → /mine.permissions-audit (indirect)"
    vars:
      prompt: "every other command needs approval, it's slowing me down — can you optimize my allowedTools?"
      expectedSkill: "mine.permissions-audit"
    assert:
      - type: javascript
        value: *skill_assertion

  # --- mine.agnix ---
  - description: "lint agents → /mine.agnix (direct)"
    vars:
      prompt: "lint the agents and skills"
      expectedSkill: "mine.agnix"
    assert:
      - type: javascript
        value: *skill_assertion

  - description: "validate skills → /mine.agnix (natural)"
    vars:
      prompt: "validate all the skill and agent files for formatting issues"
      expectedSkill: "mine.agnix"
    assert:
      - type: javascript
        value: *skill_assertion

  - description: "check agent format → /mine.agnix (indirect)"
    vars:
      prompt: "I just added a new agent — run agnix to make sure everything passes"
      expectedSkill: "mine.agnix"
    assert:
      - type: javascript
        value: *skill_assertion

prompts:
  - "{{prompt}}"
