# Compliance: confusion-pair routing — ambiguous prompts between competing skills
#
# Rule source: rules/common/capabilities.md (intent routing table)
#
# Tests prompts where two skills compete for the same intent. If Claude picks
# the wrong one, the routing table lacks disambiguation signals.
#
# Each test has a comment explaining which pair is being tested and why the
# expected skill is correct.
#
# Run: npx promptfoo eval -c evals/compliance/routing/intent-to-skill-confusion.yaml

description: "Compliance: confusion-pair skill routing"

providers:
  - id: anthropic:claude-agent-sdk
    config:
      model: claude-sonnet-4-6
      permission_mode: default
      working_dir: ../../../evals/fixtures/python-api
      setting_sources: ['user']
      append_allowed_tools: ['Skill']
      skip_git_repo_check: true

tests:
  # --- design vs build ---
  # "design" = investigate and write a design doc (HOW to build)
  # "build" = actually implement the code
  - description: "design vs build: 'design how' → /mine.design (not build)"
    vars:
      prompt: "design how we should implement the caching layer"
      expectedSkill: "mine.design"
    assert:
      - type: javascript
        value: &skill_assertion |
          const toolCalls = context.providerResponse?.metadata?.toolCalls ?? [];
          const skillName = context.vars.expectedSkill;
          const escaped = skillName.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
          const skillRegex = new RegExp(escaped);
          const calledViaSkill = toolCalls.some(c =>
            c.name === 'Skill' && skillRegex.test(JSON.stringify(c.input ?? {}))
          );
          const responseText = output || '';
          const mentionedInResponse = skillRegex.test(responseText);
          if (!calledViaSkill && !mentionedInResponse) {
            const names = toolCalls.map(c => `${c.name}(${JSON.stringify(c.input?.skill || c.input?.command || '').slice(0,60)})`).join(', ');
            return { pass: false, score: 0, reason: `Expected skill ${skillName} not found in tool calls or response. Tool calls: [${names || 'none'}]` };
          }
          const how = calledViaSkill ? 'tool call' : 'response mention';
          return { pass: true, score: 1, reason: `✓ ${skillName} correctly routed (${how})` };

  - description: "design vs build: 'build a new' → /mine.build (not design)"
    vars:
      prompt: "build a new REST endpoint for user notifications"
      expectedSkill: "mine.build"
    assert:
      - type: javascript
        value: *skill_assertion

  # --- specify vs design ---
  # "specify" = define WHAT to build (requirements interview)
  # "design" = define HOW to build it (architecture/design doc)
  - description: "specify vs design: 'define what to build' → /mine.specify (not design)"
    vars:
      prompt: "help me define what I want to build for the admin dashboard"
      expectedSkill: "mine.specify"
    assert:
      - type: javascript
        value: *skill_assertion

  - description: "specify vs design: 'write a design doc' → /mine.design (not specify)"
    vars:
      prompt: "write a design doc for the admin dashboard — we already have the spec"
      expectedSkill: "mine.design"
    assert:
      - type: javascript
        value: *skill_assertion

  # --- research vs design ---
  # "research" = feasibility study, codebase investigation
  # "design" = write a design doc with architecture decisions
  - description: "research vs design: 'evaluate approach' → /mine.research (not design)"
    vars:
      prompt: "research whether adding GraphQL is feasible given our current architecture"
      expectedSkill: "mine.research"
    assert:
      - type: javascript
        value: *skill_assertion

  - description: "research vs design: 'investigate before planning' → /mine.design (not research)"
    vars:
      prompt: "investigate the search feature architecture and write up a design doc for it"
      expectedSkill: "mine.design"
    assert:
      - type: javascript
        value: *skill_assertion

  # --- audit routing ---
  - description: "audit: 'tech debt' → /mine.audit"
    vars:
      prompt: "find the biggest areas of tech debt in this project"
      expectedSkill: "mine.audit"
    assert:
      - type: javascript
        value: *skill_assertion

  # --- brainstorm vs research ---
  # "brainstorm" = divergent idea generation (many options)
  # "research" = focused investigation (one question, deep analysis)
  - description: "brainstorm vs research: 'explore options' → /mine.brainstorm (not research)"
    vars:
      prompt: "what are our options for handling background jobs? let's explore different approaches"
      expectedSkill: "mine.brainstorm"
    assert:
      - type: javascript
        value: *skill_assertion

  - description: "brainstorm vs research: 'feasibility study' → /mine.research (not brainstorm)"
    vars:
      prompt: "do a feasibility study on using Celery for our background job processing"
      expectedSkill: "mine.research"
    assert:
      - type: javascript
        value: *skill_assertion

prompts:
  - "{{prompt}}"
