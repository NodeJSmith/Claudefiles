# Compliance: engineering agent routing
#
# Rule source: rules/common/agents.md (agent routing table)
#
# Tests engineering-focused agents: sre, devops-automator, ai-engineer,
# frontend-developer, rapid-prototyper, technical-writer.
#
# Run: npx promptfoo eval -c evals/compliance/routing/intent-to-agent-engineering.yaml

description: "Compliance: engineering agents routing"

providers:
  - id: anthropic:claude-agent-sdk
    config:
      model: claude-sonnet-4-6
      permission_mode: default
      setting_sources: ['user']
      working_dir: .

tests:
  # --- engineering-sre ---
  - description: "SLOs and error budgets → sre agent (direct)"
    vars:
      prompt: "set up SLOs and error budgets for our API service"
      expectedAgent: "sre|SRE"
    assert:
      - type: javascript
        value: &agent_assertion |
          const toolCalls = context.providerResponse?.metadata?.toolCalls ?? [];
          const agentPattern = new RegExp(context.vars.expectedAgent, 'i');
          const calledViaAgent = toolCalls.some(c => {
            if (c.name !== 'Agent') return false;
            const input = JSON.stringify(c.input ?? {});
            return agentPattern.test(input);
          });
          const responseText = output || '';
          const mentionedInResponse = agentPattern.test(responseText);
          if (!calledViaAgent && !mentionedInResponse) {
            const agentCalls = toolCalls.filter(c => c.name === 'Agent').map(c => JSON.stringify(c.input?.subagent_type || c.input?.description || '').slice(0,80));
            const otherCalls = toolCalls.filter(c => c.name !== 'Agent').map(c => c.name).slice(0, 5);
            return { pass: false, score: 0, reason: `Expected agent matching /${context.vars.expectedAgent}/ not found in tool calls or response. Agent calls: [${agentCalls.join(', ') || 'none'}]. Other tools: [${otherCalls.join(', ')}]` };
          }
          const how = calledViaAgent ? 'tool call' : 'response mention';
          return { pass: true, score: 1, reason: `✓ Agent matching /${context.vars.expectedAgent}/ correctly routed (${how})` };

  - description: "observability setup → sre agent (natural)"
    vars:
      prompt: "help me set up observability with structured logging and metrics for the payment service"
      expectedAgent: "sre|SRE"
    assert:
      - type: javascript
        value: *agent_assertion

  - description: "error budget policy → sre agent (indirect)"
    vars:
      prompt: "we keep getting paged for non-critical issues — define proper SLOs so we can set error budgets"
      expectedAgent: "sre|SRE"
    assert:
      - type: javascript
        value: *agent_assertion

  # --- engineering-devops-automator ---
  - description: "CI/CD pipeline → devops-automator agent (direct)"
    vars:
      prompt: "set up a CI/CD pipeline for this project"
      expectedAgent: "devops|DevOps"
    assert:
      - type: javascript
        value: *agent_assertion

  - description: "infrastructure automation → devops-automator agent (natural)"
    vars:
      prompt: "automate the deployment process with GitHub Actions and Docker"
      expectedAgent: "devops|DevOps"
    assert:
      - type: javascript
        value: *agent_assertion

  - description: "pipeline development → devops-automator agent (indirect)"
    vars:
      prompt: "we're still deploying manually — build us a proper CI/CD pipeline with staging and production"
      expectedAgent: "devops|DevOps"
    assert:
      - type: javascript
        value: *agent_assertion

  # --- engineering-ai-engineer ---
  - description: "ML model development → ai-engineer agent (direct)"
    vars:
      prompt: "develop a classification model for categorizing support tickets"
      expectedAgent: "ai-engineer|AI Engineer"
    assert:
      - type: javascript
        value: *agent_assertion

  - description: "AI integration → ai-engineer agent (natural)"
    vars:
      prompt: "integrate an LLM-powered summarization feature into the dashboard"
      expectedAgent: "ai-engineer|AI Engineer"
    assert:
      - type: javascript
        value: *agent_assertion

  - description: "ML pipeline → ai-engineer agent (indirect)"
    vars:
      prompt: "we want to add smart recommendations to the product — build the ML pipeline for it"
      expectedAgent: "ai-engineer|AI Engineer"
    assert:
      - type: javascript
        value: *agent_assertion

  # --- engineering-frontend-developer ---
  - description: "React component → frontend-developer agent (direct)"
    vars:
      prompt: "build a React data table component with sorting and filtering"
      expectedAgent: "frontend|Frontend"
    assert:
      - type: javascript
        value: *agent_assertion

  - description: "frontend performance → frontend-developer agent (natural)"
    vars:
      prompt: "optimize the dashboard page — it's slow on initial load with too many re-renders"
      expectedAgent: "frontend|Frontend"
    assert:
      - type: javascript
        value: *agent_assertion

  - description: "UI implementation → frontend-developer agent (indirect)"
    vars:
      prompt: "the design team sent mockups for a new settings page — implement it in React with proper state management"
      expectedAgent: "frontend|Frontend"
    assert:
      - type: javascript
        value: *agent_assertion

  # --- engineering-rapid-prototyper ---
  - description: "ultra-fast POC → rapid-prototyper agent (direct)"
    vars:
      prompt: "build a quick proof of concept for the webhook handler"
      expectedAgent: "rapid-prototyper|Rapid Prototyper"
    assert:
      - type: javascript
        value: *agent_assertion

  - description: "MVP development → rapid-prototyper agent (natural)"
    vars:
      prompt: "I need an MVP of this feature by end of day — just get the core working fast"
      expectedAgent: "rapid-prototyper|Rapid Prototyper"
    assert:
      - type: javascript
        value: *agent_assertion

  - description: "quick prototype → rapid-prototyper agent (indirect)"
    vars:
      prompt: "we're demoing to the CEO tomorrow — throw together a working prototype of the notification center"
      expectedAgent: "rapid-prototyper|Rapid Prototyper"
    assert:
      - type: javascript
        value: *agent_assertion

  # --- engineering-technical-writer ---
  - description: "developer docs → technical-writer agent (direct)"
    vars:
      prompt: "write developer documentation for the REST API"
      expectedAgent: "technical-writer|Technical Writer"
    assert:
      - type: javascript
        value: *agent_assertion

  - description: "API reference → technical-writer agent (natural)"
    vars:
      prompt: "create an API reference document with usage examples for each endpoint"
      expectedAgent: "technical-writer|Technical Writer"
    assert:
      - type: javascript
        value: *agent_assertion

  - description: "tutorials → technical-writer agent (indirect)"
    vars:
      prompt: "new developers keep struggling with our SDK — write a getting-started tutorial"
      expectedAgent: "technical-writer|Technical Writer"
    assert:
      - type: javascript
        value: *agent_assertion

prompts:
  - "{{prompt}}"
