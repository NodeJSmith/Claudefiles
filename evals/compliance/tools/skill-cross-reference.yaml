# Compliance: skill cross-references load correctly
#
# Tests whether "See skill: mine.gh-tools" is sufficient for Claude to use
# gh-pr-reply correctly, vs having inline docs in the skill itself.
#
# Three variants isolate the skill content's contribution:
#   A: inline docs (control) — skill embeds gh-pr-reply usage directly
#   B: cross-reference (treatment) — skill says "See skill: mine.gh-tools"
#   C: no docs (baseline) — skill has zero tool guidance
#
# Uses setting_sources: ['user'] for real-world fidelity — capabilities.md
# routing rules ARE loaded, just like in a real Claude Code session. This means
# ambient context may teach gh-pr-reply independently of the skill content.
# Variant C (no docs) measures whether the skill content adds value beyond
# what the routing rules already provide.
#
# Prompt pattern: skill content is injected via {{skill_content}} variable,
# simulating what the Skill tool does when loading a SKILL.md. This differs
# from other evals that use bare prompts or vars.prompt — here the skill
# content must vary between tests while the user message stays the same.
#
# Run: node_modules/.bin/promptfoo eval -c evals/compliance/tools/skill-cross-reference.yaml

description: "Compliance: skill cross-references provide sufficient context for correct tool usage"

providers:
  - id: anthropic:claude-agent-sdk
    config:
      model: claude-sonnet-4-6
      permission_mode: default
      setting_sources: ['user']
      append_allowed_tools: ['Skill']
      working_dir: ../../../evals/fixtures/python-api

prompts:
  - |
    <command-name>mine.address-gh-comment</command-name>

    {{skill_content}}

    User's original message: /mine.address-gh-comment 'the latest github copilot comment'

    Context (pre-fetched by a previous phase — this data is authoritative, do NOT
    re-fetch from GitHub or verify these IDs. Execute the reply immediately using
    the IDs below):
    - Current PR: #42
    - Latest Copilot comment:
      - Database ID: 184729356
      - Thread ID: PRRT_kwDONx4a2s5_Rg3v
      - File: src/acme_api/routers/users.py, line 15
      - Author: copilot[bot]
      - Body: "Consider adding error handling for the API call on line 15."
    - The comment has NOT been addressed yet in the code.
    - Do NOT read the file, fix the code, or verify anything. Just reply and resolve.

tests:
  - description: "Variant A (inline docs) — gh-pr-reply is used"
    vars:
      skill_content: |
        # Address GitHub Comment

        Reply to a specific GitHub PR review comment, then resolve the thread.

        ## Steps

        1. Identify the target comment from the context provided
        2. Compose a brief, professional reply acknowledging the feedback
        3. Reply to the comment and resolve the thread in one step

        ## GitHub Helper Scripts

        Use these scripts instead of raw `gh` commands:

        | Script | Purpose |
        |--------|---------|
        | `gh-pr-reply <pr> <comment-id> <body> [--resolve <thread-id>]` | Reply to a comment, optionally resolving the thread |
        | `gh-pr-resolve-thread <thread-id> [...]` | Resolve one or more threads by GraphQL ID |
    assert:
      - type: javascript
        value: &assert_gh_pr_reply_used |
          const toolCalls = context.providerResponse?.metadata?.toolCalls ?? [];
          const bashCalls = toolCalls.filter((c) => c.name === 'Bash');
          const usedHelper = bashCalls.some((c) =>
            /gh-pr-reply/.test(c.input?.command ?? '')
          );
          if (!usedHelper) {
            const cmds = bashCalls
              .map((c) => c.input?.command ?? JSON.stringify(c.input ?? ''))
              .join('\n  ');
            return {
              pass: false,
              score: 0,
              reason: `gh-pr-reply not used. Bash commands:\n  ${cmds || 'none'}`,
            };
          }
          return { pass: true, score: 1, reason: '✓ gh-pr-reply correctly used' };

      - type: javascript
        value: &assert_no_raw_gh_api |
          const toolCalls = context.providerResponse?.metadata?.toolCalls ?? [];
          const bashCalls = toolCalls.filter((c) => c.name === 'Bash');
          const violations = bashCalls.filter((c) => {
            const cmd = c.input?.command ?? '';
            return /gh api.*comment|gh pr comment/.test(cmd);
          });
          if (violations.length > 0) {
            return {
              pass: false,
              score: 0,
              reason: `Raw gh command used instead of gh-pr-reply: ${violations.map((c) => c.input?.command).join('; ')}`,
            };
          }
          return { pass: true, score: 1, reason: '✓ Raw gh api/gh pr comment correctly avoided' };

      - type: javascript
        value: &assert_resolve |
          const toolCalls = context.providerResponse?.metadata?.toolCalls ?? [];
          const bashCalls = toolCalls.filter((c) => c.name === 'Bash');
          const usedResolve = bashCalls.some((c) => {
            const cmd = c.input?.command ?? '';
            return /gh-pr-reply.*--resolve/.test(cmd);
          });
          const usedResolveSeparate = bashCalls.some((c) =>
            /gh-pr-resolve-thread/.test(c.input?.command ?? '')
          );
          if (!usedResolve && !usedResolveSeparate) {
            const cmds = bashCalls
              .map((c) => c.input?.command ?? '')
              .filter((c) => /gh-pr/.test(c))
              .join('\n  ');
            return {
              pass: false,
              score: 0,
              reason: `Thread not resolved. gh-pr-* calls:\n  ${cmds || 'none'}`,
            };
          }
          return {
            pass: true,
            score: 1,
            reason: usedResolve
              ? '✓ --resolve flag used with gh-pr-reply'
              : '✓ gh-pr-resolve-thread used separately',
          };

      - type: javascript
        value: &assert_correct_ids |
          const toolCalls = context.providerResponse?.metadata?.toolCalls ?? [];
          const bashCalls = toolCalls.filter((c) => c.name === 'Bash');
          const replyCall = bashCalls.find((c) =>
            /gh-pr-reply/.test(c.input?.command ?? '')
          );
          if (!replyCall) {
            return { pass: false, score: 0, reason: 'No gh-pr-reply call to check IDs against' };
          }
          const cmd = replyCall.input?.command ?? '';
          const hasPR = /\b42\b/.test(cmd);
          const hasCommentId = /\b184729356\b/.test(cmd);
          const missing = [];
          if (!hasPR) missing.push('PR #42');
          if (!hasCommentId) missing.push('comment ID 184729356');
          if (missing.length > 0) {
            return {
              pass: false,
              score: 0,
              reason: `gh-pr-reply missing correct IDs: ${missing.join(', ')}. Command: ${cmd}`,
            };
          }
          return { pass: true, score: 1, reason: '✓ Correct PR and comment IDs used' };

  - description: "Variant B (cross-reference) — gh-pr-reply is used via skill lookup"
    vars:
      skill_content: |
        # Address GitHub Comment

        Reply to a specific GitHub PR review comment, then resolve the thread.

        ## Steps

        1. Identify the target comment from the context provided
        2. Compose a brief, professional reply acknowledging the feedback
        3. Reply to the comment and resolve the thread in one step

        ## GitHub Helper Scripts

        See skill: `mine.gh-tools` for GitHub helper script usage, flags, and examples.
        Use these helpers instead of raw `gh` commands.
    assert:
      - type: javascript
        value: *assert_gh_pr_reply_used

      - type: javascript
        value: *assert_no_raw_gh_api

      - type: javascript
        value: *assert_resolve

      - type: javascript
        value: *assert_correct_ids

      - type: javascript
        value: |
          const toolCalls = context.providerResponse?.metadata?.toolCalls ?? [];
          const skillCalls = toolCalls.filter((c) => c.name === 'Skill');
          const calledGhTools = skillCalls.some((c) =>
            /mine\.gh-tools|gh-tools/.test(JSON.stringify(c.input ?? {}))
          );
          if (!calledGhTools) {
            const skills = skillCalls
              .map((c) => JSON.stringify(c.input))
              .join(', ');
            return {
              pass: false,
              score: 0,
              reason: `mine.gh-tools not loaded via Skill tool. Skill calls: [${skills || 'none'}]`,
            };
          }
          return { pass: true, score: 1, reason: '✓ mine.gh-tools loaded via cross-reference' };

  - description: "Variant C (no docs) — baseline without any tool guidance"
    vars:
      skill_content: |
        # Address GitHub Comment

        Reply to a specific GitHub PR review comment, then resolve the thread.

        ## Steps

        1. Identify the target comment from the context provided
        2. Compose a brief, professional reply acknowledging the feedback
        3. Reply to the comment and resolve the thread in one step
    assert:
      - type: javascript
        value: *assert_gh_pr_reply_used

      - type: javascript
        value: *assert_no_raw_gh_api

      - type: javascript
        value: *assert_resolve

      - type: javascript
        value: *assert_correct_ids
