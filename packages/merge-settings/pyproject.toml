[build-system]
requires = ["setuptools>=80"]
build-backend = "setuptools.build_meta"

[project]
name = "merge-settings"
version = "1.0.0"
description = "Three-layer Claude Code settings merger with hook-aware strategy"
requires-python = ">=3.10"
dependencies = ["deepmerge"]

[project.scripts]
claude-merge-settings = "merge_settings.cli:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[dependency-groups]
dev = [
    "pytest>=9.0",
]
