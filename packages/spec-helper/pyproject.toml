[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "spec-helper"
version = "2.0.0"
description = "Work Package and spec directory management for the caliper v2 pipeline"
requires-python = ">=3.11"
dependencies = ["python-frontmatter"]

[project.scripts]
spec-helper = "spec_helper.cli:main"

[dependency-groups]
dev = [
    "pytest>=9.0.2",
]
