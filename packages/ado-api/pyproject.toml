[build-system]
build-backend = "setuptools.build_meta"
requires = ["setuptools>=80"]

[project]
name = "ado-api"
version = "0.1.0"
description = "Azure DevOps CLI — builds, logs, and PR management"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.0,<3",
    "pydantic-settings>=2.5,<3",
]

[project.scripts]
ado-api = "ado_api.cli:main"

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-mock>=3.12.0,<4",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
addopts = ["-p", "no:warnings"]
testpaths = ["tests"]
