[rules]
disabled_rules = [
  # XML-001: Template placeholders in skill/command markdown (<KEY>, <branch>,
  #          <default-branch>, etc.) are intentional, not broken XML tags.
  "XML-001",

  # CC-SK-006: mine-commit-push and mine-ship are user-invocable skills, not
  #            autonomous agents — the "dangerous skill" guard doesn't apply.
  "CC-SK-006",

  # CC-HK-008: Hook scripts live in scripts/hooks/ and are symlinked into
  #            $CLAUDE_CONFIG_DIR at install time. CI checks out the repo without
  #            running install.sh, so the resolved paths don't exist there.
  "CC-HK-008",

  # AS-013: references/common/*.md paths are intentionally two levels deep,
  #         mirroring the rules/common/ convention. Skills reference these
  #         files by their installed path under ${CLAUDE_CONFIG_DIR}/references/.
  "AS-013",
]
